name: tests

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dailystonks-delivery
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: |
            dailystonks-delivery/requirements.txt
            dailystonks-delivery/requirements-dev.txt
            dailystonks/engine/pyproject.toml

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          pip install -e ../dailystonks/engine

      - name: Unit tests
        run: python -m pytest -q

  integration:
    # Keep integration opt-in (manual button) so PRs stay fast.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dailystonks-delivery
    env:
      DAILYSTONKS_ENGINE: ${{ github.workspace }}/dailystonks/engine
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: |
            dailystonks-delivery/requirements.txt
            dailystonks-delivery/requirements-dev.txt
            dailystonks/engine/pyproject.toml

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          pip install -e ../dailystonks/engine

      - name: Integration tests (Docker Postgres)
        run: python -m pytest -q -m integration tests/integration -rs
