name: tests

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
    inputs:
      run_integration:
        description: "Run integration tests (Docker Postgres)"
        type: boolean
        default: false
  schedule:
    # GitHub schedules are UTC. This is 03:17 UTC daily (adjust as you like).
    - cron: "17 3 * * *"

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dailystonks-delivery
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: |
            dailystonks-delivery/requirements.txt
            dailystonks-delivery/requirements-dev.txt
            dailystonks/engine/pyproject.toml

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          pip install -e ../dailystonks/engine

      - name: Unit tests
        run: python -m pytest -q

  integration:
    # Run nightly OR when manually requested via checkbox
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_integration == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: dailystonks-delivery
    env:
      MPLBACKEND: Agg
      DAILYSTONKS_ENGINE: ${{ github.workspace }}/dailystonks/engine
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: |
            dailystonks-delivery/requirements.txt
            dailystonks-delivery/requirements-dev.txt
            dailystonks/engine/pyproject.toml

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          pip install -e ../dailystonks/engine

      - name: Integration tests (Docker Postgres)
        run: python -m pytest -q -m integration tests/integration -rs
